<!DOCTYPE html>
<html>
<head>
    <title>Register - PrepMaster</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            background: var(--bg-dark);
        }
        .register-container {
            max-width: 500px;
            margin: 50px auto;
            background: var(--glass-bg);
            padding: 40px;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg), 0 0 1px rgba(255, 255, 255, 0.5) inset;
            border: 1px solid var(--glass-border);
        }
        .register-container h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 32px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        @media (max-width: 480px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="register-container animate-fade-in">
    <h1>🎓 Create Account</h1>
    
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    {% if success %}
    <div class="success">{{ success }}</div>
    {% endif %}

    <form method="POST">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required placeholder="Choose a username">
        </div>
        
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required placeholder="your@email.com">
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required placeholder="••••••••">
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="mobile_number">Mobile Number</label>
                <input type="text" id="mobile_number" name="mobile_number" required placeholder="10-digit number" maxlength="10">
            </div>
            <div class="form-group">
                <label for="age">Age</label>
                <input type="number" id="age" name="age" required placeholder="15-70" min="15" max="70">
            </div>
        </div>
        
        <div class="form-group">
            <label for="gender">Gender</label>
            <select id="gender" name="gender" required>
                <option value="">Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>
        </div>
        
        <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">Create Account</button>
    </form>

    <div class="register-link">
        Already have an account? <a href="/login">Login here</a>
    </div>
</div>

</body>
</html>
